name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: build-and-push
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/isaac-ai-ready-record

jobs:
  # Gate: build the image ONLY if the test battery passes. Previously this
  # workflow and the Validation Battery both fired on push:main with NO
  # dependency between them, so a red suite could still build + ship to prod
  # (only the local ship.sh pytest gated it). `needs: test` makes a failing
  # test physically block the build, the GHCR push, AND the deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install jsonschema rfc3339-validator PyYAML GitPython requests pytest flask flask-cors
      - name: Run validation battery
        run: pytest tests/ -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            # Auto-increment: find latest tag and bump patch
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            if [ -z "$LATEST" ]; then
              echo "version=0.0.1" >> $GITHUB_OUTPUT
            else
              VERSION=${LATEST#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              echo "version=$MAJOR.$MINOR.$((PATCH + 1))" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name lowercase
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            ISAAC_BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest

      - name: Create and push git tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote — skipping."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
