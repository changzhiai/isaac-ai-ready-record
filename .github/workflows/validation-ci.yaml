name: Validation Battery

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  battery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install jsonschema rfc3339-validator PyYAML GitPython requests pytest

      - name: Run validation battery
        run: |
          pytest tests/test_validation_battery.py -v --tb=short

      - name: Check schema diagram freshness
        run: |
          git clone https://github.com/ISAAC-DOE/isaac-ai-ready-record.wiki.git /tmp/wiki || exit 0
          python3 tools/generate_schema_diagram.py --check /tmp/wiki/Schema-Architecture.md
