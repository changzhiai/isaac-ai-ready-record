name: Validation Battery

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  battery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install jsonschema rfc3339-validator PyYAML GitPython requests pytest flask flask-cors

      - name: Run validation battery
        run: |
          pytest tests/ -v --tb=short

      - name: Check wiki generated sections freshness
        # Hard gate on main only. On PRs this is ADVISORY: a PR that changes
        # the schema/vocabulary CANNOT match the not-yet-regenerated wiki
        # (chicken-and-egg) — failing the whole battery for that produced
        # days of false-alarm failure emails.
        run: |
          if ! git clone --depth 1 https://github.com/ISAAC-DOE/isaac-ai-ready-record.wiki.git /tmp/wiki; then
            echo "::warning::wiki clone failed — freshness check skipped"
            exit 0
          fi
          set +e
          python3 tools/generate_schema_diagram.py --check /tmp/wiki/Schema-Architecture.md
          d=$?
          python3 tools/generate_wiki_vocab.py --check /tmp/wiki
          v=$?
          python3 tools/generate_validation_docs.py --check /tmp/wiki
          r=$?
          python3 tools/generate_constraint_matrix.py --check /tmp/wiki
          m=$?
          set -e
          if [ $d -ne 0 ] || [ $v -ne 0 ] || [ $r -ne 0 ] || [ $m -ne 0 ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "::error::Wiki generated sections are stale on main — run the generators and push the wiki."
              exit 1
            else
              echo "::warning::Wiki will need regeneration after this PR merges (expected for schema/vocab changes)."
            fi
          fi
